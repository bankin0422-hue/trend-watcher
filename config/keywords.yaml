# =============================================================
# キーワード辞書（人間が随時更新する。コード変更不要）
#
# 記法:
#   - "単語"        : タイトルにその単語を含めばヒット（大文字小文字無視）
#   - "単語A+単語B" : AとB の両方をタイトルに含む場合のみヒット
#
# マッチはS級→A級→B級の順に評価し、最初にヒットした級を採用する。
# =============================================================

scoring:
  # スコア = キーワード級の重み × ソース信頼度 × 拡散速度補正
  tier_weights:
    S: 100
    A: 40
    B: 10
  trust_multipliers:
    official: 1.5   # 公式
    media: 1.2      # 大手メディア
    community: 1.0  # Reddit本文
    leak: 0.8       # リークサブレ（S級キーワードなら未確認フラグ付きでS通知に届く係数）
  # スコアがこの値以上で各級に分類（閾値超えで昇格が起きる）
  thresholds:
    S: 80
    A: 35
  # 同一キーワードでのS級即時通知のクールダウン(時間)。
  # 大ニュースは各メディアが一斉に報じるため、初報のみ即時通知し
  # 続報は同時間内はA級ダイジェストへ回して通知疲れを防ぐ
  s_cooldown_hours: 6

keywords:
  S:
    # --- 動作確認用（受け入れテスト後に削除してよい） ---
    - "TW-TEST"
    # --- エッジランナーズS2 ---
    - "エッジランナーズ+配信日"
    - "エッジランナーズ+配信決定"
    - "エッジランナーズ+シーズン2"
    - "Edgerunners+release date"
    - "Edgerunners+Season 2"
    - "Edgerunners+premiere"
    # --- Cyberpunk続編 Orion ---
    - "Project Orion"
    - "Cyberpunk+Orion"
    - "Cyberpunk+sequel"
    - "サイバーパンク+続編"
    - "Cyberpunk 2"
    # --- Witcher 4 ---
    - "Witcher 4+release date"
    - "Witcher IV+release date"
    - "ウィッチャー4+発売日"
    - "ウィッチャー4+発売決定"

  A:
    # キャラ名（S2新キャラは判明次第追加）
    - "ウィーク"
    - "キングスリー"
    - "デイビッド+エッジランナーズ"
    - "ルーシー+エッジランナーズ"
    - "David Martinez"
    # 作品名の一般言及（メディア報道レベル）
    - "エッジランナーズ"
    - "Edgerunners"
    - "Witcher 4"
    - "Witcher IV"
    - "ウィッチャー4"
    # アップデート・パッチ・コラボ
    - "サイバーパンク+アップデート"
    - "サイバーパンク+パッチ"
    - "Cyberpunk+update"
    - "Cyberpunk+patch"
    - "Cyberpunk+コラボ"
    - "サイバーパンク+コラボ"
    - "Cyberpunk+collab"
    - "Phantom Liberty"
    - "仮初めの自由"

  B:
    # 一般的な言及・セール
    - "サイバーパンク2077"
    - "Cyberpunk 2077"
    - "サイバーパンク+セール"
    - "Cyberpunk+sale"
    - "CD Projekt"
    - "CDPR"
    - "ウィッチャー"
    - "Witcher"
    - "Night City"

# -------------------------------------------------------------
# 視聴者価値の観点（通知に必ず含める定型プロンプト）
# タイトルに contains のいずれかを含む場合、その prompt を採用。
# 上から順に評価し最初のヒットを使う。どれにも該当しなければ default。
# -------------------------------------------------------------
viewer_value:
  rules:
    - contains: ["配信日", "配信決定", "release date", "premiere", "発売日", "発売決定"]
      prompt: "いつ見られるか/S1をいつ復習すべきか/受け皿動画への導線確認"
    - contains: ["リーク", "leak", "rumour", "rumor", "噂"]
      prompt: "どこまで信じていいか/一次ソースは何か/公式発表はいつになりそうか"
    - contains: ["パッチ", "アップデート", "patch", "update", "hotfix"]
      prompt: "何が変わるか/自分のプレイに影響はあるか/今から始める人はどうすべきか"
    - contains: ["トレーラー", "trailer", "映像", "teaser", "ティザー"]
      prompt: "何が映っていたか/新情報はどこか/考察できるポイントは何か"
    - contains: ["コラボ", "collab", "crossover"]
      prompt: "何が手に入るか/期限はいつまでか/入手手順はどうするか"
    - contains: ["セール", "sale", "割引", "discount"]
      prompt: "いくらで買えるか/どのエディションを買うべきか/期限はいつまでか"
  default: "このニュースでチューマの視聴体験は何が変わるか/今すぐ知るべき理由は何か"
